services:
  postgres:
    image: postgres:16
    container_name: ais_iot_store_pg
    environment:
      POSTGRES_DB: ais_iot_store
      POSTGRES_USER: ais
      POSTGRES_PASSWORD: ais
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db:/work/db:ro
      - ./results:/work/results
volumes:
  pgdata:
